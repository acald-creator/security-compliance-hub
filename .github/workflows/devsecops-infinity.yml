# .github/workflows/devsecops-infinity.yml
name: DevSecOps Infinity Loop

on:
  workflow_call:
    inputs:
      phase:
        description: 'Current phase in DevSecOps loop'
        required: true
        type: string
      registry:
        description: 'Container registry hostname (e.g. ghcr.io)'
        required: false
        type: string
        default: 'ghcr.io'
      image:
        # Defaults to `${{ github.repository }}` at step time.
        # `workflow_call` input defaults cannot reference the `github` context,
        # so we resolve this at runtime inside each step that uses it.
        description: 'Image path within the registry (defaults to github.repository)'
        required: false
        type: string
        default: ''

jobs:
  # ♾️ PLAN - Threat Modeling & Security Requirements
  plan-phase:
    if: inputs.phase == 'plan' || inputs.phase == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Check for Threat Model
        run: |
          if [ ! -f "docs/THREAT_MODEL.md" ]; then
            echo "❌ Missing threat model documentation"
            exit 1
          fi
      
      - name: Validate Security Requirements
        run: |
          if [ ! -f "docs/SECURITY_REQUIREMENTS.md" ]; then
            echo "⚠️ Warning: No security requirements documented"
          fi
      
      - name: Check ADRs for Security Decisions
        run: |
          if ls docs/adr/*security*.md 1> /dev/null 2>&1; then
            echo "✅ Security ADRs found"
          else
            echo "⚠️ No security-related ADRs found"
          fi

  # ♾️ CODE - Secure Coding & Pre-commit Hooks
  code-phase:
    if: inputs.phase == 'code' || inputs.phase == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Verify Pre-commit Hooks
        run: |
          if [ -f "lefthook.yml" ] || [ -f ".pre-commit-config.yaml" ]; then
            echo "✅ Pre-commit hooks configured"
          else
            echo "❌ No pre-commit hooks found"
            exit 1
          fi
      
      - name: Check Code Signing
        run: |
          git log --show-signature -1 || echo "⚠️ Commit not signed"
      
      - name: Run Security Linters
        run: |
          # Run Biome for JS/TS
          if [ -f "biome.json" ]; then
            bunx @biomejs/biome check .
          fi

  # ♾️ BUILD - Secure Build & SBOM Generation
  build-phase:
    if: inputs.phase == 'build' || inputs.phase == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.json
      
      - name: Scan Dependencies
        run: |
          # Use the appropriate scanner for the language
          if [ -f "package.json" ]; then
            bunx audit-ci --moderate
          elif [ -f "go.mod" ]; then
            go list -json -m all | nancy sleuth
          fi
      
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            sbom.json

  # ♾️ TEST - Security Testing
  test-phase:
    if: inputs.phase == 'test' || inputs.phase == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Run Security Tests
        run: |
          # Run security-focused tests if a `tests/security` directory exists
          if [ -d "tests/security" ]; then
            bun test tests/security
          fi

      # DAST (ZAP) is intentionally omitted: a reusable workflow can't know
      # how to start the caller's application on a given port. Callers that
      # want DAST should add their own job that boots the app and then runs
      # `zaproxy/action-full-scan`.

  # ♾️ RELEASE - Signing & Attestation
  release-phase:
    if: inputs.phase == 'release' || inputs.phase == 'all'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    env:
      REGISTRY: ${{ inputs.registry }}
      IMAGE: ${{ inputs.image != '' && inputs.image || github.repository }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Artifacts
        run: |
          # Sign container images if a Dockerfile exists in the caller repo
          if [ -f "Dockerfile" ]; then
            cosign sign --yes "${REGISTRY}/${IMAGE}:${{ github.sha }}"
          fi

      - name: Create Attestations
        if: hashFiles('sbom.json') != ''
        run: |
          cosign attest --yes \
            --predicate sbom.json \
            --type spdx \
            "${REGISTRY}/${IMAGE}:${{ github.sha }}"

  # ♾️ DEPLOY - Secure Deployment
  deploy-phase:
    if: inputs.phase == 'deploy' || inputs.phase == 'all'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ inputs.registry }}
      IMAGE: ${{ inputs.image != '' && inputs.image || github.repository }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Image Signatures
        run: |
          cosign verify \
            --certificate-identity-regexp ".*" \
            --certificate-oidc-issuer-regexp ".*" \
            "${REGISTRY}/${IMAGE}:${{ github.sha }}"
      
      - name: Policy Validation
        run: |
          # Validate against OPA policies
          opa eval -d policies/opa/ -i deployment.json "data.deployment.allow"

  # 🔏 Generate SLSA Provenance (top-level job using reusable workflow)
  generate-provenance:
    needs: build-phase
    if: inputs.phase == 'build' || inputs.phase == 'all'
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.9.0
    with:
      base64-subjects: "${{ github.sha }}"
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ♾️ OPERATE - Runtime Security
  operate-phase:
    if: inputs.phase == 'operate' || inputs.phase == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Deploy Security Monitoring
        run: |
          echo "Deploying Falco rules..."
          # kubectl apply -f monitoring/falco-rules.yaml
      
      - name: Configure Network Policies
        run: |
          echo "Applying network policies..."
          # kubectl apply -f policies/network-policies.yaml

  # ♾️ MONITOR - Continuous Monitoring
  monitor-phase:
    if: inputs.phase == 'monitor' || inputs.phase == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Check Vulnerability Alerts
        uses: actions/github-script@v9
        with:
          script: |
            const alerts = await github.rest.dependabot.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            
            if (alerts.data.length > 0) {
              core.warning(`Found ${alerts.data.length} open vulnerability alerts`);
            }
      
      - name: Security Metrics
        run: |
          # Collect and report security metrics
          echo "Collecting security metrics..."