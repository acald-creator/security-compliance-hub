# .github/workflows/security-scan.yml
name: Security Compliance Suite

on:
  workflow_call:
    inputs:
      repository:
        description: 'Repository to scan'
        required: false
        type: string
        default: ${{ github.repository }}
      severity-threshold:
        description: 'Minimum severity to fail the build'
        required: false
        type: string
        default: 'HIGH'
      compliance-frameworks:
        description: 'Compliance frameworks to check (comma-separated)'
        required: false
        type: string
        default: 'openssf,owasp,slsa'
      enable-signing:
        description: 'Enable Sigstore signing'
        required: false
        type: boolean
        default: true
    secrets:
      SNYK_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false
      # Note: callers should pass GITHUB_TOKEN via `secrets: inherit` when
      # invoking this reusable workflow. Do NOT declare a secret named
      # `GITHUB_TOKEN` here because that name is reserved by GitHub Actions and
      # causes a collision when used in `workflow_call`.
    outputs:
      security-score:
        description: 'Overall security score'
        value: ${{ jobs.aggregate-results.outputs.score }}
      compliance-status:
        description: 'Compliance check results'
        value: ${{ jobs.aggregate-results.outputs.compliance }}
      vulnerabilities:
        description: 'Vulnerability summary'
        value: ${{ jobs.aggregate-results.outputs.vulnerabilities }}

jobs:
  # 🔍 Secret Scanning
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # 🛡️ SAST - Static Application Security Testing
  #
  # CodeQL is run as a matrix across the languages GitHub auto-detects for the
  # calling repo. `returntocorp/semgrep-action` and `semgrep/semgrep-action`
  # are both deprecated — we install the Semgrep CLI directly and emit SARIF.
  sast-scan:
    name: SAST Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, typescript, python, go, java]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

      - name: Set up Python for Semgrep
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install and run Semgrep
        run: |
          pip install --quiet semgrep
          SEMGREP_ARGS=(--sarif --output=semgrep.sarif)
          SEMGREP_ARGS+=(--config=p/security-audit --config=p/owasp-top-ten --config=p/r2c-security-audit)
          if [ -d "./policies/semgrep" ]; then
            SEMGREP_ARGS+=(--config=./policies/semgrep/)
          fi
          semgrep "${SEMGREP_ARGS[@]}" || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # 📦 Dependency Scanning
  dependency-scan:
    name: Dependency Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # 1.1.0
        with:
          project: ${{ github.repository }}
          path: '.'
          format: 'ALL'
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS 7
      
      - name: OSV Scanner
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./

  # 🐳 Container Scanning
  #
  # Runs on every invocation; individual steps skip themselves when the
  # relevant files are absent. The previous `if: contains(fromJSON(...), ...)`
  # guard was broken because `head_commit.modified` is an array and the
  # expression never evaluated true.
  container-scan:
    name: Container Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect container files
        id: detect
        run: |
          if [ -f Dockerfile ] || compgen -G "Dockerfile.*" >/dev/null || [ -f docker-compose.yml ] || [ -f docker-compose.yaml ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Trivy
        if: steps.detect.outputs.found == 'true'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Run Hadolint
        if: steps.detect.outputs.found == 'true' && hashFiles('Dockerfile') != ''
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  # 🔏 SLSA Provenance & Sigstore
  supply-chain:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    if: ${{ inputs.enable-signing }}
    permissions:
      # Request only the minimal permission needed for OIDC/cosign operations.
      # Do NOT request `contents: write` or `packages: write` here so callers
      # that only grant read access can still reuse this workflow. If a
      # caller needs to grant elevated permissions (for signing/pushing to
      # package registries), they should set them in the calling workflow.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      
      - name: Sign SBOM
        run: |
          cosign sign-blob --yes \
            --output-signature sbom.spdx.json.sig \
            --output-certificate sbom.spdx.json.crt \
            sbom.spdx.json
      
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.spdx.json.sig
            sbom.spdx.json.crt

  generate-slsa-provenance:
    name: Generate SLSA Provenance
    needs: supply-chain
    if: ${{ inputs.enable-signing }}
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v1.9.0
    with:
      base64-subjects: "${{ github.sha }}"
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 📊 OpenSSF Scorecard
  openssf-scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    if: contains(inputs.compliance-frameworks, 'openssf')
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.3.1
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true

      - name: Upload to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard.sarif
          category: scorecard

  # ✅ OWASP Compliance
  #
  # Note: a DAST step (OWASP ZAP) is intentionally omitted here because a
  # reusable workflow cannot know how to start the caller's application.
  # Callers that want DAST should add a separate job that boots their app
  # (e.g., via docker compose) and then runs `zaproxy/action-baseline`.
  owasp-check:
    name: OWASP Compliance
    runs-on: ubuntu-latest
    if: contains(inputs.compliance-frameworks, 'owasp')
    steps:
      - uses: actions/checkout@v4

      - name: OWASP Dependency Check
        run: |
          docker run --rm \
            -v "$(pwd)":/src \
            owasp/dependency-check \
            --scan /src \
            --format JSON \
            --out /src/dependency-check-report.json

  # 🏁 Aggregate Results
  aggregate-results:
    name: Security Score & Compliance
    runs-on: ubuntu-latest
    # `supply-chain` is listed here so `needs.supply-chain.result` is a valid
    # context expression. It is gated by `inputs.enable-signing` at the job
    # level, so when signing is disabled `needs.supply-chain.result` is
    # `skipped` — which the score calculation handles.
    needs: [secret-scan, sast-scan, dependency-scan, container-scan, openssf-scorecard, owasp-check, supply-chain]
    if: always()
    outputs:
      score: ${{ steps.calculate.outputs.score }}
      compliance: ${{ steps.calculate.outputs.compliance }}
      vulnerabilities: ${{ steps.calculate.outputs.vulnerabilities }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Calculate Security Score
        id: calculate
        run: |
          # Aggregate all security findings
          SCORE=0
          TOTAL_CHECKS=0
          
          # Calculate weighted score
          if [ "${{ needs.secret-scan.result }}" == "success" ]; then
            SCORE=$((SCORE + 20))
          fi
          TOTAL_CHECKS=$((TOTAL_CHECKS + 20))
          
          if [ "${{ needs.sast-scan.result }}" == "success" ]; then
            SCORE=$((SCORE + 25))
          fi
          TOTAL_CHECKS=$((TOTAL_CHECKS + 25))
          
          if [ "${{ needs.dependency-scan.result }}" == "success" ]; then
            SCORE=$((SCORE + 25))
          fi
          TOTAL_CHECKS=$((TOTAL_CHECKS + 25))
          if [ "${{ needs.container-scan.result }}" == "skipped" ] || [ "${{ needs.container-scan.result }}" == "success" ]; then
            SCORE=$((SCORE + 15))
          fi
          TOTAL_CHECKS=$((TOTAL_CHECKS + 15))

          if [ "${{ needs.openssf-scorecard.result }}" == "success" ]; then
            SCORE=$((SCORE + 15))
          fi
          TOTAL_CHECKS=$((TOTAL_CHECKS + 15))

          # Only access supply-chain results when signing is enabled to avoid invalid context
          if [ "${{ inputs.enable-signing }}" = "true" ]; then
            if [ "${{ needs.supply-chain.result }}" == "success" ]; then
              SCORE=$((SCORE + 15))
            fi
            TOTAL_CHECKS=$((TOTAL_CHECKS + 15))
          fi
          
          FINAL_SCORE=$((SCORE * 100 / TOTAL_CHECKS))
          echo "score=$FINAL_SCORE" >> "$GITHUB_OUTPUT"
          
          # Generate compliance status
          # Determine SLSA/compliance state in a guarded way
          if [ "${{ inputs.enable-signing }}" = "true" ]; then
            SLSA_STATUS="${{ needs.supply-chain.result }}"
          else
            SLSA_STATUS="not_requested"
          fi

          COMPLIANCE_STATUS='{
            "openssf": "${{ needs.openssf-scorecard.result }}",
            "owasp": "${{ needs.owasp-check.result }}",
            "slsa": "'"$SLSA_STATUS"'"
          }'
          echo "compliance=$COMPLIANCE_STATUS" >> "$GITHUB_OUTPUT"
      
      - name: Generate Security Report
        uses: actions/github-script@v7
        with:
          script: |
            const score = ${{ steps.calculate.outputs.score }};
            const badge = score >= 80 ? '🟢' : score >= 60 ? '🟡' : '🔴';
            
            const comment = `## ${badge} Security Scan Results
            
            **Overall Score:** ${score}/100
            
            ### Compliance Status
            - OpenSSF Scorecard: ${{ needs.openssf-scorecard.result }}
            - OWASP Compliance: ${{ needs.owasp-check.result }}
            - Supply Chain Security: ${{ needs.supply-chain.result }}
            
            ### Security Checks
            - 🔍 Secret Scanning: ${{ needs.secret-scan.result }}
            - 🛡️ SAST Analysis: ${{ needs.sast-scan.result }}
            - 📦 Dependency Scan: ${{ needs.dependency-scan.result }}
            - 🐳 Container Security: ${{ needs.container-scan.result }}
            
            [View Full Report](https://github.com/${{ github.repository }}/security)`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });