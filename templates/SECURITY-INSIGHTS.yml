header:
  schema-version: "1.0.0"
  last-updated: "2026-01-01"
  last-reviewed: "2026-01-01"
  commit-hash: ""
  project-url: "https://github.com/[OWNER]/[REPO]"
  changelog: "https://github.com/[OWNER]/[REPO]/releases"

project-lifecycle:
  status: "active"
  bug-fixes-only: false

contribution-policy:
  accepts-pull-requests: true
  accepts-automated-pull-requests: true
  automated-tools-list:
    - automated-tool: "dependabot"
      action: "allowed"
      path:
        - "/"

distribution-points:
  - "https://github.com/[OWNER]/[REPO]"

security-artifacts:
  self-assessment:
    - comment: "See SECURITY.md for the security policy."
      evidence-url:
        - "https://github.com/[OWNER]/[REPO]/blob/main/SECURITY.md"

security-contacts:
  - type: "email"
    value: "[SECURITY_EMAIL]"

security-testing:
  - tool-type: "sca"
    tool-name: "Dependabot"
    tool-url: "https://github.com/dependabot"
    integration:
      ad-hoc: false
      ci: true
      before-release: true
  - tool-type: "sast"
    tool-name: "Semgrep"
    tool-url: "https://semgrep.dev"
    integration:
      ad-hoc: false
      ci: true
      before-release: false
  - tool-type: "sast"
    tool-name: "CodeQL"
    tool-url: "https://codeql.github.com"
    integration:
      ad-hoc: false
      ci: true
      before-release: false

vulnerability-reporting:
  accepts-vulnerability-reports: true
  email-contact: "[SECURITY_EMAIL]"
  security-policy: "https://github.com/[OWNER]/[REPO]/blob/main/SECURITY.md"
  comment: "Please report vulnerabilities via email. Do not open a public issue."
