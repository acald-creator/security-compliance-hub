pre-commit:
  parallel: true
  commands:
    # Secret scanning — only scan staged changes. `gitleaks detect` scans
    # the entire git history on every commit, which is slow and surfaces
    # historical findings that cannot be fixed in the current commit.
    gitleaks:
      run: gitleaks git --pre-commit --staged --config .gitleaks.toml .

    # Static analysis for security issues
    semgrep:
      glob: "*.{js,ts,py,go}"
      run: semgrep --config=auto {staged_files}

commit-msg:
  commands:
    # Conventional commit enforcement (uncomment one):

    # Option 1: Cocogitto
    # cocogitto:
    #   run: cog verify {1}

    # Option 2: commitlint
    # commitlint:
    #   run: npx commitlint --edit {1}

pre-push:
  commands:
    # Check the dependency tree for known vulnerabilities.
    # Uses audit-ci (backed by npm audit) because Bun has no `audit` subcommand.
    audit:
      run: bunx audit-ci --moderate

    # Uncomment to block pushes that fail the test suite:
    # test:
    #   run: bun test
