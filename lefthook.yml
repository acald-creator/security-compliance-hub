pre-commit:
  parallel: true
  commands:
    # Biome for formatting/linting
    biome:
      glob: "*.{js,jsx,ts,tsx,json}"
      run: bunx @biomejs/biome check {staged_files}
    
    # Secret scanning — only scan staged changes. `gitleaks detect` would
    # rescan the entire git history on every commit, which is slow and
    # surfaces historical findings that cannot be fixed without a rewrite.
    gitleaks:
      run: gitleaks git --pre-commit --staged --config .gitleaks.toml .
    
    # Security scanning
    semgrep:
      glob: "*.{js,ts,py,go}"
      run: semgrep --config=auto {staged_files}

# Conventional-commit enforcement is intentionally omitted. To enable it,
# uncomment one of the options below and add them under a `commit-msg:
# commands:` block. Lefthook rejects an empty commands: block, so the block
# itself is omitted until at least one is uncommented.
#   cocogitto:
#     run: cog verify {1}
#   commitlint:
#     run: bunx commitlint --edit {1}

pre-push:
  commands:
    # Run tests
    # test:
      # run: bun test

    # Check the dependency tree for known vulnerabilities.
    # `bun audit` was added in Bun 1.2 and understands bun.lock natively.
    audit:
      run: bun audit

